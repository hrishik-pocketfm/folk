<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>{% block title %}FOLK{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg:      #fef9f0;
      --bg-card: #ffffff;
      --primary: #f97316;
      --primary-dark: #c2410c;
      --text:    #1c1917;
      --muted:   #78716c;
      --border:  #f3e8d8;
      --shadow:  0 2px 12px rgba(249,115,22,0.08);
      --topbar-h:   56px;
      --botnav-h:   60px;
      --safe-bot:   env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { height:100%; }
    body {
      background:var(--bg); min-height:100vh; font-family:'Nunito',sans-serif;
      color:var(--text); margin:0; overscroll-behavior:none;
    }

    /* Top bar */
    .fk-topbar {
      position:fixed; top:0; left:0; right:0; height:var(--topbar-h);
      background:#fff; border-bottom:1px solid var(--border);
      box-shadow:0 1px 8px rgba(249,115,22,0.07);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 1rem; z-index:100;
    }
    .fk-brand { font-size:1.1rem; font-weight:800; color:var(--primary); letter-spacing:0.5px; }
    .fk-back  { color:var(--muted); font-size:0.82rem; text-decoration:none; font-weight:700;
                display:flex; align-items:center; gap:4px; }
    .fk-back:active { color:var(--primary); }

    /* Bottom nav */
    .fk-nav {
      position:fixed; bottom:0; left:0; right:0;
      height:calc(var(--botnav-h) + var(--safe-bot));
      background:#fff; border-top:1px solid var(--border);
      box-shadow:0 -2px 12px rgba(0,0,0,0.04);
      display:flex; align-items:flex-start; padding-top:6px;
      padding-bottom:var(--safe-bot); z-index:100;
    }
    .fk-nav a {
      flex:1; display:flex; flex-direction:column; align-items:center;
      gap:3px; text-decoration:none; color:var(--muted);
      font-size:0.62rem; font-weight:700; padding:4px 0;
      transition:color 0.15s;
    }
    .fk-nav a i { font-size:1.3rem; line-height:1; }
    .fk-nav a.active { color:var(--primary); }

    /* Page wrap */
    .fk-wrap {
      padding:calc(var(--topbar-h) + 14px) 14px calc(var(--botnav-h) + var(--safe-bot) + 16px);
      max-width:700px; margin:0 auto;
    }

    /* Cards */
    .fk-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:16px; box-shadow:var(--shadow);
    }

    /* Buttons */
    .fk-btn {
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--primary); color:#fff; font-weight:800; border:none;
      border-radius:14px; padding:0.65rem 1.5rem; font-size:0.9rem;
      cursor:pointer; text-decoration:none; min-height:44px;
      font-family:'Nunito',sans-serif; transition:opacity 0.15s;
    }
    .fk-btn:active { opacity:0.82; }
    .fk-btn.w-100 { width:100%; border-radius:14px; padding:0.75rem; font-size:1rem; }
    .fk-btn-ghost {
      display:inline-flex; align-items:center; justify-content:center;
      background:transparent; border:1.5px solid var(--primary); color:var(--primary);
      border-radius:14px; padding:0.55rem 1.2rem; font-size:0.85rem; font-weight:700;
      cursor:pointer; text-decoration:none; min-height:40px; font-family:'Nunito',sans-serif;
    }

    /* Inputs */
    .fk-input {
      width:100%; background:#fafaf8; border:1.5px solid var(--border);
      border-radius:12px; font-size:16px; padding:0.7rem 0.9rem;
      color:var(--text); font-family:'Nunito',sans-serif;
      outline:none; -webkit-appearance:none; appearance:none;
      transition:border-color 0.15s;
    }
    .fk-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(249,115,22,0.1); }
    .fk-input::placeholder { color:var(--muted); }
    select.fk-input option { background:#fff; }
    textarea.fk-input { resize:vertical; }
    .fk-label { display:block; font-size:0.72rem; font-weight:700; color:var(--muted);
                text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }

    /* Headings */
    h1 { font-size:1.5rem; font-weight:800; color:var(--text); margin-bottom:4px; }
    h2 { font-size:1.15rem; font-weight:800; color:var(--text); }
    h3 { font-size:1rem; font-weight:700; color:var(--text); }

    /* Alerts */
    .fk-alert {
      background:#fff7ed; border:1px solid #fed7aa; color:#9a3412;
      border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:0.88rem; font-weight:600;
    }
    .fk-alert-err {
      background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
      border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:0.88rem; font-weight:600;
    }

    /* Session badges */
    .fbadge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:0.7rem; font-weight:800; margin:2px; }
    .fbadge-l1   { background:#fef3c7; color:#92400e; }
    .fbadge-l2   { background:#fce7f3; color:#9d174d; }
    .fbadge-l3   { background:#ede9fe; color:#5b21b6; }
    .fbadge-folk { background:#d1fae5; color:#065f46; }
    .fbadge-new  { background:#ecfdf5; border:1px solid #6ee7b7; color:#065f46; }

    /* Follow-up status colors */
    .fs-pending { color:#d97706; background:#fffbeb; border:1px solid #fde68a; }
    .fs-called  { color:#2563eb; background:#eff6ff; border:1px solid #bfdbfe; }
    .fs-joined  { color:#059669; background:#ecfdf5; border:1px solid #a7f3d0; }
    .fs-dropped { color:#6b7280; background:#f9fafb; border:1px solid #e5e7eb; }
  </style>
</head>
<body>

<!-- Top Bar -->
<header class="fk-topbar">
  <a href="{% url 'dashboard' %}" class="fk-back"><i class="bi bi-arrow-left"></i> Main App</a>
  <span class="fk-brand"><i class="bi bi-house-heart me-1"></i>FOLK</span>
  <span style="font-size:0.78rem;color:var(--muted)">{{ user.name }}</span>
</header>

<!-- Content -->
<div class="fk-wrap">
  {% for message in messages %}
  <div class="{% if message.tags == 'error' %}fk-alert-err{% else %}fk-alert{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

<!-- Bottom Nav -->
<nav class="fk-nav">
  <a href="{% url 'folk_home' %}" class="{% block nav_home %}{% endblock %}">
    <i class="bi bi-grid-1x2"></i>Overview
  </a>
  <a href="{% url 'folk_sessions_list' %}" class="{% block nav_sessions %}{% endblock %}">
    <i class="bi bi-calendar-check"></i>Sessions
  </a>
  <a href="{% url 'folk_followup_list' %}" class="{% block nav_followup %}{% endblock %}">
    <i class="bi bi-person-lines-fill"></i>Follow-up
  </a>
  <a href="{% url 'colleges_list' %}" class="{% block nav_colleges %}{% endblock %}">
    <i class="bi bi-building"></i>Colleges
  </a>
</nav>

{% block extra_js %}{% endblock %}
</body>
</html>
